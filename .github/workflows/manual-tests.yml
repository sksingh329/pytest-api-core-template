name: Manual API Tests

# Triggered manually from the Actions tab (or via the API/CLI) — no automatic
# push/PR trigger. Useful for on-demand runs against a specific branch/marker.
on:
  workflow_dispatch:
    inputs:
      markers:
        description: 'pytest -m marker expression to filter tests (leave blank to run all)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      BEARER_TOKEN: ${{ secrets.BEARER_TOKEN }}
      BEARER_BLOCKED_TOKEN: ${{ secrets.BEARER_BLOCKED_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest ${{ github.event.inputs.markers && format('-m "{0}"', github.event.inputs.markers) || '' }}

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-report-${{ github.run_id }}-${{ github.run_attempt }}
          path: reports/
          if-no-files-found: ignore

      - name: Publish report to GitHub Pages
        if: always()
        id: publish-report
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: reports
          destination_dir: runs/${{ github.run_id }}-${{ github.run_attempt }}
          keep_files: true

      - name: Verify report is published and add link to job summary
        if: always()
        run: |
          report_file=$(find reports -name '*.html' -print -quit)
          if [ -z "$report_file" ]; then
            echo "::error::No HTML report found under reports/ — nothing was published."
            exit 1
          fi
          report_path="runs/${{ github.run_id }}-${{ github.run_attempt }}/${report_file#reports/}"
          report_url="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/${report_path}"

          echo "Waiting for $report_url to become available..."
          for i in $(seq 1 20); do
            status=$(curl -s -o /dev/null -w '%{http_code}' "$report_url")
            if [ "$status" = "200" ]; then
              echo "✅ Report is live: $report_url"
              echo "📄 [API HTML report]($report_url)" >> "$GITHUB_STEP_SUMMARY"
              exit 0
            fi
            echo "Attempt $i/20: got HTTP $status, retrying in 15s..."
            sleep 15
          done

          echo "::error::Report did not become available at $report_url after retries. Check that GitHub Pages is enabled for this repo (Settings → Pages → Deploy from a branch → gh-pages)."
          exit 1
