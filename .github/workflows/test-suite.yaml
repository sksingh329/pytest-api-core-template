name: Test Suite (GoRest.in API)

# Runs automatically on every push to any branch, and on every pull-request
# event (opened/updated/reopened/closed-including-merged) targeting any branch.
# Can also be triggered manually from the Actions tab (workflow_dispatch),
# optionally filtered by pytest marker.
on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'
    types:
      - opened
      - synchronize
      - reopened
      - closed
  workflow_dispatch:
    inputs:
      markers:
        description: 'pytest -m marker expression to filter tests (leave blank to run all)'
        required: false
        default: ''

# Cancel any older in-progress run for the same branch/PR when a newer one starts,
# so overlapping triggers (e.g. push + PR sync on the same commit) don't duplicate work.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  # Custom domain configured for GitHub Pages on this repo (CNAME on gh-pages branch)
  PAGES_BASE_URL: https://githubreports.apicore.template.subodhsingh.in

jobs:
  test:
    # Skip PRs that were closed without being merged; run for every other event.
    if: github.event.action != 'closed' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    env:
      BEARER_TOKEN: ${{ secrets.BEARER_TOKEN }}
      BEARER_BLOCKED_TOKEN: ${{ secrets.BEARER_BLOCKED_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest ${{ github.event.inputs.markers && format('-m "{0}"', github.event.inputs.markers) || '' }}

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-report-${{ github.run_id }}-${{ github.run_attempt }}
          path: reports/
          if-no-files-found: ignore

      - name: Checkout gh-pages branch
        if: always()
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      - name: Publish report and refresh dashboard
        if: always()
        run: |
          set -e
          report_file=$(find reports -name '*.html' -print -quit)
          if [ -z "$report_file" ]; then
            echo "::error::No HTML report found under reports/ — nothing to publish."
            exit 1
          fi
          report_rel=${report_file#reports/}
          run_slug="${{ github.run_id }}-${{ github.run_attempt }}"
          dest_dir="gh-pages/runs/$run_slug/$(dirname "$report_rel")"
          mkdir -p "$dest_dir"
          cp "$report_file" "$dest_dir/"

          python3 .github/scripts/generate_dashboard.py gh-pages

          cd gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Publish report for run $run_slug" || echo "Nothing to commit"
          git push origin HEAD:gh-pages

      - name: Verify report and dashboard are live, add links to job summary
        if: always()
        run: |
          report_file=$(find reports -name '*.html' -print -quit)
          report_rel=${report_file#reports/}
          run_slug="${{ github.run_id }}-${{ github.run_attempt }}"
          report_url="$PAGES_BASE_URL/runs/$run_slug/$report_rel"
          dashboard_url="$PAGES_BASE_URL/"

          for url in "$report_url" "$dashboard_url"; do
            echo "Waiting for $url to become available..."
            live=false
            for i in $(seq 1 20); do
              status=$(curl -s -o /dev/null -w '%{http_code}' "$url")
              if [ "$status" = "200" ]; then
                echo "✅ Live: $url"
                live=true
                break
              fi
              echo "Attempt $i/20: got HTTP $status, retrying in 15s..."
              sleep 15
            done
            if [ "$live" != "true" ]; then
              echo "::error::$url did not become available after retries. Check GitHub Pages settings (Settings → Pages → Deploy from a branch → gh-pages)."
              exit 1
            fi
          done

          {
            echo "📄 [API HTML report]($report_url)"
            echo "📊 [Reports dashboard]($dashboard_url)"
          } >> "$GITHUB_STEP_SUMMARY"
