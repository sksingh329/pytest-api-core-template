name: Automated API Tests

# Runs automatically on every push to any branch, and on every pull-request
# event (opened/updated/reopened/closed-including-merged) targeting any branch.
on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'
    types:
      - opened
      - synchronize
      - reopened
      - closed

permissions:
  contents: write

jobs:
  test:
    # Skip PRs that were closed without being merged; run for every other event.
    if: github.event.action != 'closed' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    env:
      BEARER_TOKEN: ${{ secrets.BEARER_TOKEN }}
      BEARER_BLOCKED_TOKEN: ${{ secrets.BEARER_BLOCKED_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-report-${{ github.run_id }}-${{ github.run_attempt }}
          path: reports/
          if-no-files-found: ignore

      - name: Publish report to GitHub Pages
        if: always()
        id: publish-report
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: reports
          destination_dir: runs/${{ github.run_id }}-${{ github.run_attempt }}
          keep_files: true

      - name: Verify report is published and add link to job summary
        if: always()
        run: |
          report_file=$(find reports -name '*.html' -print -quit)
          if [ -z "$report_file" ]; then
            echo "::error::No HTML report found under reports/ — nothing was published."
            exit 1
          fi
          report_path="runs/${{ github.run_id }}-${{ github.run_attempt }}/${report_file#reports/}"
          report_url="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/${report_path}"

          echo "Waiting for $report_url to become available..."
          for i in $(seq 1 20); do
            status=$(curl -s -o /dev/null -w '%{http_code}' "$report_url")
            if [ "$status" = "200" ]; then
              echo "✅ Report is live: $report_url"
              echo "📄 [API HTML report]($report_url)" >> "$GITHUB_STEP_SUMMARY"
              exit 0
            fi
            echo "Attempt $i/20: got HTTP $status, retrying in 15s..."
            sleep 15
          done

          echo "::error::Report did not become available at $report_url after retries. Check that GitHub Pages is enabled for this repo (Settings → Pages → Deploy from a branch → gh-pages)."
          exit 1
